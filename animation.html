<!DOCTYPE html>
<html>
<head>
    <title>Oracle SR Auto Reloader</title>
    <style>
        body {
            font-family: Arial;
            background: #111827;
            color: white;
            padding: 30px;
        }

        .box {
            background: #1f2937;
            padding: 25px;
            width: 500px;
            border-radius: 10px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 15px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #10b981;
            color: white;
            cursor: pointer;
        }

        .small {
            color: #d1d5db;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Oracle SR Auto Reloader</h2>

    <label>Oracle SR URL:</label>
    <input type="text" id="url" placeholder="Paste Oracle SR URL here">

    <label>Reload every how many minutes?</label>
    <input type="number" id="minutes" value="5">

    <button onclick="startReload()">Start</button>
    <button onclick="stopReload()" style="background:#ef4444;">Stop</button>

    <p id="status" class="small">Status: Not started</p>
    <p id="countdown" class="small"></p>
</div>

<script>
    let oracleTab = null;
    let reloadTimer = null;
    let countdownTimer = null;
    let remainingSeconds = 0;

    function startReload() {
        let url = document.getElementById("url").value.trim();
        let minutes = parseInt(document.getElementById("minutes").value);

        if (url === "") {
            alert("Please paste Oracle SR URL");
            return;
        }

        if (!url.startsWith("http://") && !url.startsWith("https://")) {
            url = "https://" + url;
        }

        if (isNaN(minutes) || minutes < 3) {
            minutes = 5;
        }

        localStorage.setItem("oracle_sr_url", url);
        localStorage.setItem("oracle_sr_minutes", minutes);

        oracleTab = window.open(url, "OracleSRTab");

        if (!oracleTab) {
            alert("Popup blocked. Please allow popups for this page.");
            return;
        }

        clearInterval(reloadTimer);
        clearInterval(countdownTimer);

        remainingSeconds = minutes * 60;

        document.getElementById("status").innerText =
            "Status: Running. Reloading every " + minutes + " minutes.";

        reloadTimer = setInterval(function () {
            if (oracleTab.closed) {
                oracleTab = window.open(url, "OracleSRTab");
            } else {
                oracleTab.location.href = url;
            }

            remainingSeconds = minutes * 60;

            document.getElementById("status").innerText =
                "Last reload: " + new Date().toLocaleString();

        }, minutes * 60 * 1000);

        countdownTimer = setInterval(function () {
            remainingSeconds--;

            let min = Math.floor(remainingSeconds / 60);
            let sec = remainingSeconds % 60;

            document.getElementById("countdown").innerText =
                "Next reload in: " + min + " min " + sec + " sec";

        }, 1000);
    }

    function stopReload() {
        clearInterval(reloadTimer);
        clearInterval(countdownTimer);

        document.getElementById("status").innerText = "Status: Stopped";
        document.getElementById("countdown").innerText = "";
    }

    window.onload = function () {
        let savedUrl = localStorage.getItem("oracle_sr_url");
        let savedMinutes = localStorage.getItem("oracle_sr_minutes");

        if (savedUrl) {
            document.getElementById("url").value = savedUrl;
        }

        if (savedMinutes) {
            document.getElementById("minutes").value = savedMinutes;
        }
    };
</script>

</body>
</html>
